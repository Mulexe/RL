      "+.alicdn.com": "223.5.5.5"
      "+.cangku.moe": "8.8.8.8"
      "+.jd.com": "119.29.29.29"
      "+.faleno.jp": tls://1.1.1.1
      "+.2dfan.com": tls://1.1.1.1
      "+.oppai-av.com": tls://1.1.1.1
      "+.jm18c-oec.cc": tls://1.1.1.1
